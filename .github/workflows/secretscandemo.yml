name: secretscandemo
# Acceptance demo for the secret-scan hard block. Proves both paths:
#   clean  — a fixture with no secrets passes
#   leak   — a FAKE secret generated at runtime (never committed) hard-blocks
on:
  workflow_dispatch:

jobs:
  clean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: scan a clean fixture (expect pass)
        uses: ./actions/secret-scan
        with:
          workdir: examples/bugdemo

  leak:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: plant a FAKE secret at runtime (never committed)
        run: |
          set -euo pipefail
          mkdir -p /tmp/leakfix
          # A fake private-key block reliably trips gitleaks' private-key rule.
          {
            echo "-----BEGIN RSA PRIVATE KEY-----"
            head -c 512 /dev/urandom | base64
            echo "-----END RSA PRIVATE KEY-----"
          } > /tmp/leakfix/leaked.pem
      - name: scan (expect HARD BLOCK)
        id: scan
        continue-on-error: true
        uses: ./actions/secret-scan
        with:
          workdir: /tmp/leakfix
      - name: assert the scan blocked
        env:
          OUTCOME: ${{ steps.scan.outcome }}
        run: |
          set -euo pipefail
          if [ "$OUTCOME" != "failure" ]; then
            echo "::error::secret-scan did NOT block a planted secret (outcome=$OUTCOME)"
            exit 1
          fi
          echo "secret-scan correctly hard-blocked the planted secret ✅"
