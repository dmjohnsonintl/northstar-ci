name: Northstar pipeline
on:
  workflow_call:
    inputs:
      workdir:
        type: string
        default: '.'
      zones-json:
        type: string
        required: true
      coverage-min:
        type: string
        default: '80'
      coverage-mode:
        type: string
        default: 'no-decrease'
      node-version:
        type: string
        default: '18'
      engine:
        description: 'Fix-agent engine: stub (default, no LLM) | claude-code'
        type: string
        default: 'stub'

# Least privilege: only what promote-regression needs on the default branch.
permissions:
  contents: write
  pull-requests: write

concurrency:
  group: northstar-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    # Expose whether the TEST suite failed (vs the coverage gate), so the fix
    # job only runs for real test failures — not coverage drops (a human/test
    # author handles those).
    outputs:
      suite-failed: ${{ steps.suite.outcome == 'failure' }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node-version }}
      - name: Install project deps
        working-directory: ${{ inputs.workdir }}
        run: npm ci
      # Full public action refs — local './' refs do NOT resolve when this
      # reusable workflow is called from another repo (they'd resolve against the
      # caller's checkout). Pinned to @v0, this repo's release tag.
      - name: detect-changes
        id: detect
        uses: dmjohnsonintl/northstar-ci/actions/detect-changes@v0
        with:
          zones-json: ${{ inputs.zones-json }}
          base-sha: ${{ github.event.pull_request.base.sha || github.event.before }}
          head-sha: ${{ github.sha }}
      - name: run-suite
        id: suite
        continue-on-error: true
        uses: dmjohnsonintl/northstar-ci/actions/run-suite@v0
        with:
          workdir: ${{ inputs.workdir }}
      # Coverage + promotion only make sense when the suite passed.
      - name: coverage-gate
        if: ${{ steps.suite.outcome == 'success' }}
        id: gate
        uses: dmjohnsonintl/northstar-ci/actions/coverage-gate@v0
        with:
          workdir: ${{ inputs.workdir }}
          min: ${{ inputs.coverage-min }}
          mode: ${{ inputs.coverage-mode }}
      - name: promote-regression (default branch only)
        if: ${{ steps.suite.outcome == 'success' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
        uses: dmjohnsonintl/northstar-ci/actions/promote-regression@v0
        with:
          workdir: ${{ inputs.workdir }}
          next-baseline: ${{ steps.gate.outputs.next-baseline }}
      # Fail the job when the suite failed (run-suite is continue-on-error above
      # so we can branch on it, so re-assert the failure for the check status).
      - name: Fail if the test suite failed
        if: ${{ steps.suite.outcome == 'failure' }}
        run: |
          echo "::error::test suite failed"
          exit 1

  # Single-attempt fix-agent: runs ONLY on a real test-suite failure (not a
  # coverage drop). Opens a PR on success, labels ns:needs-human on exhaustion.
  # Never auto-merges.
  fix:
    needs: gate
    # always() so this evaluates even though the gate job failed; then run ONLY
    # when the failure was a real test-suite failure (not a coverage drop).
    if: ${{ always() && needs.gate.outputs.suite-failed == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node-version }}
      - name: Install project deps
        working-directory: ${{ inputs.workdir }}
        run: npm ci
      - name: Capture the failing-test log
        continue-on-error: true
        uses: dmjohnsonintl/northstar-ci/actions/run-suite@v0
        with:
          workdir: ${{ inputs.workdir }}
      - name: fix-agent
        uses: dmjohnsonintl/northstar-ci/actions/fix-agent@v0
        with:
          workdir: ${{ inputs.workdir }}
          engine: ${{ inputs.engine }}
          failing-log: ${{ inputs.workdir }}/artifacts/test.log
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
