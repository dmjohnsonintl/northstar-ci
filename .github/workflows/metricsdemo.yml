name: metricsdemo
# Dogfood caller for the Tier 1 observability workflow: renders this repo's own
# Northstar status dashboard daily (and on demand). A real consumer adds an
# equivalent 3-line caller on their own schedule.
on:
  schedule:
    - cron: '17 13 * * *'   # daily ~13:17 UTC
  workflow_dispatch:
    inputs:
      post-digest:
        type: boolean
        default: false

jobs:
  metrics:
    uses: ./.github/workflows/northstar-metrics.yml
    with:
      since-days: 14
      baseline-path: examples/pydemo/.northstar/coverage-baseline.json
      commit-dashboard: true
      post-digest: ${{ github.event.inputs.post-digest == 'true' }}
    permissions:
      contents: write
      issues: write
