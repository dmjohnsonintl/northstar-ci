name: pydemo
on:
  workflow_dispatch:
permissions:
  contents: write
  pull-requests: write
jobs:
  demo:
    uses: ./.github/workflows/northstar-pipeline.yml
    with:
      workdir: examples/pydemo
      adapter: python
      install-cmd: pip install -r requirements.txt
      zones-json: '[{"zone":"src","glob":"src/**"}]'
      coverage-min: '0'
      coverage-mode: 'report'
      engine: 'stub'
