name: aidemo
on:
  workflow_dispatch:
# push a branch + open a PR. The CLI-based claude-code engine needs only the
# ANTHROPIC_API_KEY secret (no OIDC / no GitHub App).
permissions:
  contents: write
  pull-requests: write
jobs:
  demo:
    uses: ./.github/workflows/northstar-pipeline.yml
    with:
      workdir: examples/aidemo
      zones-json: '[{"zone":"src","glob":"src/**"}]'
      coverage-min: '0'
      coverage-mode: 'report'
      engine: 'claude-code'
    secrets: inherit          # passes ANTHROPIC_API_KEY to the claude-code engine
