name: aidemo
on:
  workflow_dispatch:
# contents/pull-requests: push a branch + open a PR. id-token: required by the
# claude-code engine (anthropics/claude-code-action uses OIDC).
permissions:
  contents: write
  pull-requests: write
  id-token: write
jobs:
  demo:
    uses: ./.github/workflows/northstar-pipeline.yml
    with:
      workdir: examples/aidemo
      zones-json: '[{"zone":"src","glob":"src/**"}]'
      coverage-min: '0'
      coverage-mode: 'report'
      engine: 'claude-code'
    secrets: inherit          # passes ANTHROPIC_API_KEY to the claude-code engine
