name: Northstar metrics
# Tier 1 observability (spec §12): a read-model over traces the pipeline already
# emits — Actions run history, the coverage-baseline git history, Northstar PRs,
# and ns:* labeled issues. Renders a dashboard to the job summary + commits
# docs/northstar-status.md; optionally posts a daily digest as a deduped issue.
# No secrets, pure GitHub primitives.
on:
  workflow_call:
    inputs:
      repo:
        description: 'owner/name to read traces from (default: this repo)'
        type: string
        default: ''
      since-days:
        type: number
        default: 7
      baseline-path:
        description: 'Path to the coverage-baseline JSON for the trend'
        type: string
        default: '.northstar/coverage-baseline.json'
      commit-dashboard:
        description: 'Commit docs/northstar-status.md back to the repo'
        type: boolean
        default: true
      post-digest:
        description: 'Post the one-line daily digest as a deduped issue'
        type: boolean
        default: false
      digest-issue-title:
        type: string
        default: 'Northstar daily digest'
      alerts:
        description: 'Write deduped alert issues (false = evaluate + render only)'
        type: boolean
        default: true
      escalation-rate:
        type: number
        default: 0.5
      coverage-delta-min:
        type: number
        default: 0
      claim-age-seconds:
        type: number
        default: 21600
      canary-workflow:
        type: string
        default: 'Northstar canary'
      alert-label:
        type: string
        default: 'ns:alert'

permissions:
  contents: write   # commit the refreshed dashboard
  issues: write     # post the digest (only when post-digest=true)

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # full history for the coverage trend
      - uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Gather traces
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ inputs.repo || github.repository }}
          BASELINE_PATH: ${{ inputs.baseline-path }}
        run: |
          set -euo pipefail
          # Actions run history (pipeline health, green rate, per-workflow).
          gh run list --repo "$REPO" --limit 200 \
            --json databaseId,workflowName,conclusion,status,event,createdAt,updatedAt \
            > runs.json
          # Coverage trend from the baseline file's own git history.
          node lib/coverage-history-cli.js --path "$BASELINE_PATH" > coverage.json
          # Agent/model health from Northstar PRs + ns:* labeled issues.
          OPENED=$(gh pr list --repo "$REPO" --state all --limit 200 --json headRefName \
            -q '[.[]|select(.headRefName|startswith("ns/"))]|length')
          REPRO=$(gh pr list --repo "$REPO" --state all --limit 200 --json headRefName \
            -q '[.[]|select(.headRefName|startswith("ns/bug/"))]|length')
          MERGED=$(gh pr list --repo "$REPO" --state merged --limit 200 --json headRefName \
            -q '[.[]|select(.headRefName|startswith("ns/"))]|length')
          CLOSED=$(gh pr list --repo "$REPO" --state closed --limit 200 --json headRefName \
            -q '[.[]|select(.headRefName|startswith("ns/"))]|length')
          ESC=$(gh issue list --repo "$REPO" --state all --label ns:needs-human --limit 200 --json number -q 'length')
          NEEDS_INFO=$(gh issue list --repo "$REPO" --state all --label ns:needs-info --limit 200 --json number -q 'length')
          jq -n \
            --argjson opened "$OPENED" --argjson escalations "$ESC" \
            --argjson reproduced "$REPRO" --argjson needsInfo "$NEEDS_INFO" \
            --argjson merged "$MERGED" --argjson closed "$CLOSED" \
            '{fixPrsOpened:$opened, escalations:$escalations, reproduced:$reproduced, needsInfo:$needsInfo, fixPrsMerged:$merged, fixPrsClosedUnmerged:$closed}' \
            > agent.json

          # Coordination health + regression growth, from substrate traces.
          # Enumerate active claim refs AND extract each claim body so
          # ages are available to the starvation alert. An unreadable claim is skipped.
          CLAIM_REFS=$(git ls-remote --heads origin 'ns/claim/*' | awk '{print $2}' | sed 's#refs/heads/##')
          CLAIMS=$(printf '%s\n' "$CLAIM_REFS" | grep -c . || true)
          rm -rf .nsclaims && mkdir -p .nsclaims
          for ref in $CLAIM_REFS; do
            zone="${ref#ns/claim/}"
            git fetch origin "$ref" 2>/dev/null || continue
            git archive FETCH_HEAD ".northstar/claims/${zone}.json" 2>/dev/null \
              | tar -x -C .nsclaims 2>/dev/null || true
          done
          if ls .nsclaims/.northstar/claims/*.json >/dev/null 2>&1; then
            jq -s '.' .nsclaims/.northstar/claims/*.json > claims.json || echo '[]' > claims.json
          else
            echo '[]' > claims.json
          fi
          sig_count() { gh pr list --repo "$REPO" --state all --limit 200 --label "ns:signal/$1" --json number -q 'length'; }
          FLAKY=$(sig_count flaky); COVGAP=$(sig_count coverage-gap); RECLAIM=$(sig_count reclaimed)
          PROMOS=$(git log --grep='promote regression' --oneline | grep -c . || true)
          jq -n \
            --argjson claims "${CLAIMS:-0}" --argjson flaky "${FLAKY:-0}" \
            --argjson covgap "${COVGAP:-0}" --argjson reclaim "${RECLAIM:-0}" \
            --argjson promos "${PROMOS:-0}" \
            '{activeClaims:$claims, signals:{flaky:$flaky, coverageGap:$covgap, reclaimed:$reclaim}, promotions:$promos}' \
            > extra.json

          # Engine cost records from the dedicated northstar-metrics branch
          # (git archive → no worktree/index pollution). Absent branch → empty.
          git fetch origin northstar-metrics 2>/dev/null || true
          rm -rf .nsrec && mkdir -p .nsrec
          if git rev-parse --verify origin/northstar-metrics >/dev/null 2>&1; then
            git archive origin/northstar-metrics records 2>/dev/null | tar -x -C .nsrec 2>/dev/null || true
          fi
          if ls .nsrec/records/*.json >/dev/null 2>&1; then
            # Guard: a single corrupt/hand-edited record must not black out the
            # whole dashboard (this step runs under set -euo pipefail).
            jq -s '.' .nsrec/records/*.json > records.json || echo '[]' > records.json
          else
            echo '[]' > records.json
          fi

      - name: Render dashboard + digest
        env:
          REPO: ${{ inputs.repo || github.repository }}
          SINCE: ${{ inputs.since-days }}
          CANARY_WORKFLOW: ${{ inputs.canary-workflow }}
        run: |
          set -euo pipefail
          NOW="$(date -u +%FT%TZ)"
          mkdir -p docs
          node lib/metrics-cli.js --runs runs.json --coverage coverage.json --agent agent.json --extra extra.json --records records.json \
            --now "$NOW" --since "$SINCE" --repo "$REPO" --mode dashboard --canary-workflow "$CANARY_WORKFLOW" \
            | tee -a "$GITHUB_STEP_SUMMARY" > docs/northstar-status.md
          node lib/metrics-cli.js --runs runs.json --coverage coverage.json --agent agent.json --extra extra.json --records records.json \
            --now "$NOW" --since "$SINCE" --repo "$REPO" --mode digest --canary-workflow "$CANARY_WORKFLOW" > digest.txt
          echo "digest: $(cat digest.txt)"

      - name: Commit dashboard
        if: ${{ inputs.commit-dashboard }}
        run: |
          set -euo pipefail
          git config user.name "northstar[bot]"
          git config user.email "northstar@users.noreply.github.com"
          git add docs/northstar-status.md
          if git diff --cached --quiet; then
            echo "dashboard unchanged"
          else
            git commit -m "chore(metrics): refresh northstar-status dashboard [skip ci]"
            git push
          fi

      - name: Evaluate + act on §12.1 alerts
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ inputs.repo || github.repository }}
          ALERTS: ${{ inputs.alerts }}
          ESC_RATE: ${{ inputs.escalation-rate }}
          COV_MIN: ${{ inputs.coverage-delta-min }}
          CLAIM_AGE: ${{ inputs.claim-age-seconds }}
          CANARY_WORKFLOW: ${{ inputs.canary-workflow }}
          ALERT_LABEL: ${{ inputs.alert-label }}
        run: |
          set -euo pipefail
          NOW="$(date -u +%FT%TZ)"
          node lib/alerts-cli.js \
            --runs runs.json --coverage coverage.json --agent agent.json --claims claims.json \
            --now "$NOW" \
            --escalation-rate "$ESC_RATE" --coverage-delta-min "$COV_MIN" \
            --claim-age-seconds "$CLAIM_AGE" --canary-workflow "$CANARY_WORKFLOW" \
            > alerts.json
          echo "## §12.1 Alerts" >> "$GITHUB_STEP_SUMMARY"
          jq -r '.[] | "- **\(.rule)** [\(.severity)]: \(.state)"' alerts.json >> "$GITHUB_STEP_SUMMARY" || true

          if [ "$ALERTS" != "true" ]; then
            echo "alerts: rendering only (inputs.alerts=false) — no issues written"
            exit 0
          fi

          # Backstop: ensure labels exist (idempotent) so issue creation never fails.
          gh label create "$ALERT_LABEL" --repo "$REPO" --color B60205 --force 2>/dev/null || true
          gh label create "$ALERT_LABEL/page" --repo "$REPO" --color B60205 --force 2>/dev/null || true
          gh label create "$ALERT_LABEL/trend" --repo "$REPO" --color FBCA04 --force 2>/dev/null || true

          rows="$(jq -c '.[]' alerts.json)"
          while IFS= read -r a; do
            [ -z "$a" ] && continue
            RULE="$(jq -r '.rule' <<<"$a")"
            STATE="$(jq -r '.state' <<<"$a")"
            SEV="$(jq -r '.severity' <<<"$a")"
            TITLE="$(jq -r '.title' <<<"$a")"
            BODY="$(jq -r '.body' <<<"$a")"
            # Non-fatal like the create/comment/close calls below: a transient
            # `gh issue list` failure must not trip `set -e` and abort the loop
            # (which would skip the remaining alerts AND the digest step).
            NUM="$(gh issue list --repo "$REPO" --state open --label "$ALERT_LABEL" \
              --search "in:title \"$TITLE\"" --json number,title \
              -q "[.[]|select(.title==\"$TITLE\")][0].number // empty" 2>/dev/null || true)"
            if [ "$STATE" = "firing" ]; then
              if [ -z "$NUM" ]; then
                gh issue create --repo "$REPO" --title "$TITLE" --body "$BODY" \
                  --label "$ALERT_LABEL" --label "$ALERT_LABEL/$SEV" \
                  || echo "::warning::could not create alert issue for $RULE"
              else
                gh issue comment "$NUM" --repo "$REPO" --body "Still firing: $BODY" \
                  || echo "::warning::could not comment alert issue #$NUM"
              fi
            else # clear
              if [ -n "$NUM" ]; then
                gh issue comment "$NUM" --repo "$REPO" --body "Recovered: $BODY" || true
                gh issue close "$NUM" --repo "$REPO" || echo "::warning::could not close #$NUM"
              fi
            fi
          done <<< "$rows"

      - name: Post daily digest (deduped issue)
        if: ${{ inputs.post-digest }}
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ inputs.repo || github.repository }}
          TITLE: ${{ inputs.digest-issue-title }}
        run: |
          set -euo pipefail
          NUM="$(gh issue list --repo "$REPO" --state open --search "in:title \"$TITLE\"" --json number -q '.[0].number // empty')"
          if [ -z "$NUM" ]; then
            gh issue create --repo "$REPO" --title "$TITLE" --body-file digest.txt
          else
            gh issue comment "$NUM" --repo "$REPO" --body-file digest.txt
          fi
