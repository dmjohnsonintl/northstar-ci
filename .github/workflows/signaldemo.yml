name: signaldemo
# Acceptance demo for advisory signal emission: the signal action deposits a
# mortal, actor-attributed readout (and a PR label when a PR is present).
on:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  emit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
      - name: emit ns:signal/hot-area (no PR → readout only)
        id: sig
        uses: ./actions/signal
        with:
          type: hot-area
          zone: src
          ttl-seconds: '86400'
          role: detect
      - name: assert the emitted record is well-formed and conformant
        env:
          REC: ${{ steps.sig.outputs.record }}
          LABEL: ${{ steps.sig.outputs.label }}
        run: |
          set -euo pipefail
          [ "$LABEL" = "ns:signal/hot-area" ] || { echo "::error::wrong label: $LABEL"; exit 1; }
          echo "$REC" | grep -q '"type":"hot-area"' || { echo "::error::type missing"; exit 1; }
          echo "$REC" | grep -q '"role":"detect"'   || { echo "::error::actor identity missing"; exit 1; }
          echo "$REC" | grep -q '"ttlSeconds":86400' || { echo "::error::TTL (mortality) missing"; exit 1; }
          printf '%s' "$REC" > /tmp/sig.json
          node lib/substrate-cli.js validate --record /tmp/sig.json >/dev/null || { echo "::error::signal is not substrate-conformant"; exit 1; }
          echo "advisory signal emitted, well-formed, and substrate-conformant ✅"
