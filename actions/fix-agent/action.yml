name: 'Northstar fix-agent (single attempt)'
description: 'Run the configured engine once on a fix branch; on green open a PR, else label needs-human. Never auto-merges.'
inputs:
  workdir:
    default: '.'
  engine:
    description: 'stub | claude-code'
    default: 'stub'
  test-cmd:
    default: 'npm run test:ci'
  failing-log:
    description: 'Path to the failing-test log (repo-root-relative)'
    default: 'artifacts/test.log'
  anthropic-api-key:
    description: 'Required when engine=claude-code'
    default: ''
runs:
  using: 'composite'
  steps:
    - name: Create fix branch
      shell: bash
      run: |
        git config user.name "northstar[bot]"
        git config user.email "northstar@users.noreply.github.com"
        git checkout -b "ns/fix/${GITHUB_RUN_ID}"

    - name: Engine (stub)
      if: ${{ inputs.engine == 'stub' }}
      shell: bash
      env:
        NS_FIX_WORKDIR: ${{ inputs.workdir }}
        NS_FIX_LOG: ${{ inputs.failing-log }}
      run: bash "${{ github.action_path }}/../../engine/stub/fix.sh"

    - name: Engine (claude-code)
      if: ${{ inputs.engine == 'claude-code' }}
      uses: anthropics/claude-code-action@v1
      with:
        anthropic_api_key: ${{ inputs.anthropic-api-key }}
        prompt: |
          The test suite in this repository is failing. Read the failing-test log
          at ${{ inputs.failing-log }} and fix the SOURCE code (under
          ${{ inputs.workdir }}) so the tests pass. Make the minimal change.
          Do NOT weaken, skip, delete, or edit the tests to make them pass.
          Commit your fix with a clear message.

    - name: Re-run tests, then open a PR or escalate
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        NS_WORKDIR: ${{ inputs.workdir }}
        NS_TEST_CMD: ${{ inputs.test-cmd }}
        BRANCH: ns/fix/${{ github.run_id }}
        RUN_ID: ${{ github.run_id }}
      run: |
        set +e
        bash "${{ github.action_path }}/../../adapters/js-ts/run.sh"; PASS=$?
        if [ "$PASS" -eq 0 ]; then
          git push -u origin "$BRANCH"
          gh pr create --head "$BRANCH" \
            --title "Northstar fix (run ${RUN_ID})" \
            --body "Automated single-attempt fix by the '${{ inputs.engine }}' engine. **Human review required — nothing auto-merges.**" \
            || echo "PR create skipped (already exists or gh unavailable)"
          echo "[northstar] green after fix → PR opened on $BRANCH"
        else
          gh issue create \
            --title "Northstar: needs human (run ${RUN_ID})" \
            --label "ns:needs-human" \
            --body "The single-attempt fix did not make the suite green. A human is needed." \
            || echo "issue create skipped (gh unavailable)"
          echo "[northstar] still red after one attempt → labeled ns:needs-human"
        fi
