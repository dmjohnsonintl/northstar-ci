name: 'Northstar run-suite'
description: 'Run the test suite via the configured language adapter.'
inputs:
  workdir:
    description: 'Directory to run tests in'
    default: '.'
  adapter:
    description: 'Language adapter: js-ts | python'
    default: 'js-ts'
  test-cmd:
    description: 'Test command (empty = the adapter default)'
    default: ''
runs:
  using: 'composite'
  steps:
    - shell: bash
      env:
        NS_WORKDIR: ${{ inputs.workdir }}
        NS_TEST_CMD: ${{ inputs.test-cmd }}
      run: bash "${{ github.action_path }}/../../adapters/${{ inputs.adapter }}/run.sh"
