name: 'Northstar run-suite'
description: 'Run the test suite via the configured language adapter, with retry-once flake detection. A suite that fails then passes on retry is FLAKY (output flaky=true, exit 0) — quarantined, not routed to the fix-agent. Only a deterministic failure (all attempts fail) exits non-zero.'
inputs:
  workdir:
    description: 'Directory to run tests in'
    default: '.'
  adapter:
    description: 'Language adapter: js-ts | python'
    default: 'js-ts'
  test-cmd:
    description: 'Test command (empty = the adapter default)'
    default: ''
  retries:
    description: 'Retries after an initial failure (1 = retry once; 0 = no retry, e.g. when capturing a known-failing log)'
    default: '1'
outputs:
  flaky:
    description: '"true" when the suite failed then passed on retry (non-deterministic)'
    value: ${{ steps.run.outputs.flaky }}
  attempts:
    description: 'How many times the suite was run'
    value: ${{ steps.run.outputs.attempts }}
runs:
  using: 'composite'
  steps:
    - id: run
      shell: bash
      env:
        NS_WORKDIR: ${{ inputs.workdir }}
        NS_TEST_CMD: ${{ inputs.test-cmd }}
        RUN_SH: ${{ github.action_path }}/../../adapters/${{ inputs.adapter }}/run.sh
        RETRIES: ${{ inputs.retries }}
      run: bash "${{ github.action_path }}/retry.sh"
